services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: claimflow
      POSTGRES_USER: claimflow
      POSTGRES_PASSWORD: claimflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimflow"]
      interval: 5s
      timeout: 5s
      retries: 15

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://claimflow:claimflow@db:5432/claimflow
      SYNTHEA_ZIP: /data/synthea_sample_data_csv_nov2021.zip
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

